name: Auto Update README

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy template to README
        run: |
          if [ -f README_template.md ]; then
            cp README_template.md README.md
          else
            echo "template not found"
            exit 0
          fi

      - name: Update time
        run: |
          sed -i "s/{{更新时间}}/$(date '+%Y-%m-%d %H:%M:%S')/g" README.md || true

      - name: Commit changes
        run: |
          git config --global user.name "GYCDK"
          git config --global user.email "gycdk@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update" || echo "no changes"
          git push
