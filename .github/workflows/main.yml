name: Auto Update README

on:
  schedule:
    - cron: '0 2 * * *'   # 每天自动执行
  workflow_dispatch:       # 手动触发
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy template to README
        run: |
          cp README_template.md README.md

      - name: Update time
        run: |
          sed -i "s/{{更新时间}}/$(date '+%Y-%m-%d %H:%M:%S')/g" README.md

      - name: Commit changes
        run: |
          git config --global user.name "GYCDK"
          git config --global user.email "gycdk@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update" || echo "no changes"
          git pull --rebase
          git push
